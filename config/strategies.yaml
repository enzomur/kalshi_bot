# Strategy Configuration
# ======================
# Configure weights and thresholds for trading strategies.
# Strategies emit Signals; the Risk Engine decides execution.

# Global strategy settings
defaults:
  min_edge: 0.05           # Minimum edge required (5%)
  min_confidence: 0.60     # Minimum confidence required (60%)
  max_signals_per_hour: 10 # Rate limit on signals

# Individual strategy configurations
strategies:
  weather:
    enabled: true
    weight: 1.0            # Voting weight in ensemble
    min_edge: 0.08         # Strategy-specific minimum edge
    min_confidence: 0.65
    enabled_locations:
      - NYC
      - CHI
      - LAX
      - MIA

  calibration:
    enabled: true
    weight: 1.2            # Higher weight - sportsbook consensus is reliable
    min_edge: 0.05         # 5% edge required
    min_confidence: 0.60
    enabled_sports:
      - NFL
      - NBA
      - MLB

  settlement_momentum:
    enabled: true
    weight: 0.8
    min_edge: 0.10
    max_hours_to_settlement: 48.0
    min_price_for_yes: 70  # Only bet YES when price > 70c
    max_price_for_no: 30   # Only bet NO when price < 30c

  economic_data:
    enabled: false         # Disabled until FRED API configured
    weight: 0.6
    min_edge: 0.08
    max_days_to_settlement: 7.0

  new_market:
    enabled: false  # Disabled - not implemented
    weight: 0.5
    min_fair_value_edge: 0.10
    new_market_window_hours: 48.0

  mean_reversion:
    enabled: true
    weight: 0.7            # Moderate weight - statistical strategy
    min_edge: 0.05         # 5% minimum edge
    min_confidence: 0.55
    lookback_periods: 24   # Hours of price history
    z_score_threshold: 2.0 # Standard deviations for signal
    min_samples: 12        # Minimum data points required
    max_hours_to_settlement: 72.0
    reversion_target: 0.5  # Expect 50% reversion to mean

  arbitrage:
    enabled: true
    weight: 1.5            # High weight - arbitrage is guaranteed profit
    min_profit: 0.01       # 1% minimum profit after fees
    fees: 0.02             # 2% estimated fees (both platforms)

  market_make:
    enabled: false         # Disabled by default - requires active management
    weight: 0.8
    min_spread_cents: 3
    max_inventory: 50
    quote_size: 10
    target_markets: []     # Empty = auto-select liquid markets

# Ensemble voting settings
voting:
  method: weighted_average  # or: majority, unanimous
  min_strategies: 2         # Require 2+ strategies to agree for production
  min_edge: 0.03            # 3% minimum edge after aggregation
  min_confidence: 0.55
  fee_adjustment: 0.01      # 1% fee adjustment
